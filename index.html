<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Design Map</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="map-canvas"></canvas>
  <svg id="markers-svg"></svg>

  <!-- Popup card -->
  <div id="popup" class="hidden">
    <button id="popup-close" aria-label="Close">×</button>
    <div id="popup-category-bar"></div>
    <h2 id="popup-name"></h2>
    <p id="popup-location"></p>
    <p id="popup-desc"></p>
    <div id="popup-tags"></div>
    <div id="popup-footer">
      <span id="popup-wed" class="hidden">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="6.5"/>
          <polyline points="8,4 8,8 11,10"/>
        </svg>
        Jobs refresh Wed 20:00 CET
      </span>
      <a id="popup-link" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-3"/>
          <polyline points="9,1 15,1 15,7"/>
          <line x1="15" y1="1" x2="7" y2="9"/>
        </svg>
        Visit
      </a>
    </div>
  </div>

  <!-- Bottom bar: legend + search -->
  <div id="bottom-bar">
    <div id="legend">
      <button class="legend-dot active" data-cat="all" style="background:#fff" title="All"></button>
      <button class="legend-dot" data-cat="social"       style="background:#F59E0B" title="Social Design"></button>
      <button class="legend-dot" data-cat="public"       style="background:#60A5FA" title="Public Sector"></button>
      <button class="legend-dot" data-cat="sustainable"  style="background:#34D399" title="Sustainable"></button>
      <button class="legend-dot" data-cat="civic"        style="background:#A78BFA" title="Civic & Community"></button>
      <button class="legend-dot" data-cat="research"     style="background:#22D3EE" title="Design Research"></button>
      <button class="legend-dot" data-cat="humanitarian" style="background:#F87171" title="Humanitarian"></button>
    </div>

    <div id="search-bar">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="8.5" cy="8.5" r="5.5"/>
        <line x1="13" y1="13" x2="17.5" y2="17.5"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search studios &amp; agencies" autocomplete="off" spellcheck="false" />
      <svg class="mic-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="7" y="2" width="6" height="10" rx="3"/>
        <path d="M4 10a6 6 0 0 0 12 0"/>
        <line x1="10" y1="16" x2="10" y2="19"/>
      </svg>
    </div>

    <a id="submit-btn" href="submit.html" title="Submit a studio">+</a>
  </div>

  <!-- Wed countdown chip -->
  <div id="wed-chip">
    <span id="wed-dot"></span>
    <span id="wed-label"></span>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
