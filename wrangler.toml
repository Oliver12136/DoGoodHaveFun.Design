name            = "do-good"
main            = "worker.js"
compatibility_date  = "2024-09-25"
compatibility_flags = ["nodejs_compat"]
workers_dev     = true
preview_urls    = false

[assets]
directory = "./socialdesignjobs"

[[d1_databases]]
binding       = "DB"
database_name = "dogood-db"
database_id   = "c05744f3-3031-450a-a6cf-0458a36b9b5d"

[[routes]]
pattern     = "dogood.oghuzhan.work"
custom_domain = true

# ADMIN_TOKEN is stored as a Cloudflare secret (not in this file)
# To rotate: npx wrangler secret put ADMIN_TOKEN

