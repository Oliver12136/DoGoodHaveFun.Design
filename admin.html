<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Social Design Map</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-admin">

  <!-- Login gate -->
  <div id="login-screen" class="admin-login">
    <p style="color:rgba(255,255,255,0.35);font-size:13px;margin-bottom:20px;">Admin access</p>
    <input type="password" id="pw-input" placeholder="••••••••" />
    <button class="btn-submit" onclick="checkPw()" style="width:100%;border-radius:10px;">Enter</button>
    <p id="pw-error" style="color:#F87171;font-size:12px;margin-top:10px;display:none;">Incorrect password</p>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel" style="display:none;">
    <div class="admin-header">
      <h1>Pending submissions</h1>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="btn-export" onclick="exportApproved()">Export approved JSON</button>
        <a href="index.html">← Map</a>
      </div>
    </div>
    <div id="pending-list" class="pending-list"></div>
  </div>

  <script>
    // Change this password in production
    const ADMIN_PW = 'jobmap2024';

    function checkPw() {
      const val = document.getElementById('pw-input').value;
      if (val === ADMIN_PW) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display  = 'block';
        renderPending();
      } else {
        document.getElementById('pw-error').style.display = 'block';
      }
    }

    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPw();
    });

    function renderPending() {
      const list    = document.getElementById('pending-list');
      const pending = JSON.parse(localStorage.getItem('sdm_pending') || '[]');
      const unreviewed = pending.filter(p => !p._approved && !p._rejected);

      if (!unreviewed.length) {
        list.innerHTML = '<div class="empty-state">No pending submissions.</div>';
        return;
      }

      list.innerHTML = '';
      unreviewed.forEach(co => {
        const card = document.createElement('div');
        card.className = 'pending-card';
        card.innerHTML = `
          <h3>${esc(co.name)}</h3>
          <p class="pending-meta">
            ${esc(co.city)}, ${esc(co.country)} &nbsp;·&nbsp;
            <span style="color:var(--cat-color, rgba(255,255,255,0.35))">${esc(co.category)}</span>
            &nbsp;·&nbsp; ${co.lat}, ${co.lng}
            &nbsp;·&nbsp; <a href="${esc(co.website)}" target="_blank" style="color:inherit">${esc(co.website)}</a>
            &nbsp;·&nbsp; Submitted ${new Date(co._submittedAt).toLocaleDateString()}
          </p>
          <p class="pending-desc">${esc(co.description)}</p>
          ${co.tags?.length ? `<p style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:14px;">${co.tags.map(esc).join(' · ')}</p>` : ''}
          <div class="pending-actions">
            <button class="btn-approve" onclick="approve('${co.id}')">Approve</button>
            <button class="btn-reject"  onclick="reject('${co.id}')">Reject</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function approve(id) {
      const pending = JSON.parse(localStorage.getItem('sdm_pending') || '[]');
      const idx     = pending.findIndex(p => p.id === id);
      if (idx > -1) {
        pending[idx]._approved = true;
        localStorage.setItem('sdm_pending', JSON.stringify(pending));
        renderPending();
      }
    }

    function reject(id) {
      const pending = JSON.parse(localStorage.getItem('sdm_pending') || '[]');
      const idx     = pending.findIndex(p => p.id === id);
      if (idx > -1) {
        pending[idx]._rejected = true;
        localStorage.setItem('sdm_pending', JSON.stringify(pending));
        renderPending();
      }
    }

    function exportApproved() {
      const pending  = JSON.parse(localStorage.getItem('sdm_pending') || '[]');
      const approved = pending
        .filter(p => p._approved)
        .map(({ _submittedAt, _approved, _rejected, ...rest }) => rest);

      if (!approved.length) {
        alert('No approved entries yet.');
        return;
      }

      const blob = new Blob([JSON.stringify(approved, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'approved-companies.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
